name: Netbird updater

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-netbird:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Determine versions
        id: compare
        run: |
          latest_version="$(curl -fsSL https://api.github.com/repos/netbirdio/netbird/releases/latest | jq -r '.tag_name' | sed 's/^v//')"
          if [ -z "$latest_version" ] || [ "$latest_version" == "null" ]; then
            echo "Error: Failed to fetch latest Netbird version" >&2
            exit 1
          fi
          current_version="$(jq -r '.netbirdVersion' plugin/plugin.json)"
          echo "latest=${latest_version}" >> "$GITHUB_OUTPUT"
          echo "current=${current_version}" >> "$GITHUB_OUTPUT"
          if [ "$latest_version" != "$current_version" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when up to date
        if: steps.compare.outputs.update != 'true'
        run: echo "Netbird is already up to date."

      - name: Update plugin metadata
        if: steps.compare.outputs.update == 'true'
        id: plugin
        run: |
          new_version="${{ steps.compare.outputs.latest }}"
          # Get SHA256 of the new version using their checksums file or calculating it directly
          sha_url="https://github.com/netbirdio/netbird/releases/download/v${new_version}/netbird_${new_version}_linux_amd64.tar.gz"
          new_sha="$(curl -fsSL "$sha_url" | sha256sum | cut -d' ' -f1)"
          tmp="$(mktemp)"
          jq --arg version "$new_version" --arg sha "$new_sha" \
            '.netbirdVersion=$version | .netbirdSHA256=$sha' \
            plugin/plugin.json > "$tmp"
          mv "$tmp" plugin/plugin.json
          echo "full_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "sha=$new_sha" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        id: commit
        if: steps.compare.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin/plugin.json
          if git commit -m "chore: update Netbird to ${{ steps.compare.outputs.latest }}"; then
            git push origin HEAD:refs/heads/main
            echo "made=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit."
            echo "made=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for CI to pass
        if: steps.compare.outputs.update == 'true' && steps.commit.outputs.made == 'true'
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Waiting for checks to pass on commit $COMMIT_SHA..."
          
          # Wait up to 10 minutes (30 * 20s)
          for i in {1..30}; do
            # Get the combined status of all workflow runs for the commit
            # We filter out the current workflow run to avoid waiting for ourselves
            RUNS_JSON=$(gh run list --commit $COMMIT_SHA --json name,conclusion,status)
            
            # If no runs found (e.g. tests haven't started yet), wait
            # We also check if the only run is this workflow itself
            RUN_COUNT=$(echo "$RUNS_JSON" | jq '[.[] | select(.name != "Netbird updater")] | length')
            
            if [ "$RUN_COUNT" -eq 0 ]; then
              if [ "$i" -gt 5 ]; then
                echo "No tests triggered for this commit after 100s. Assuming it's safe to proceed."
                break
              fi
              echo "Waiting for tests to appear... (attempt $i/30)"
              sleep 20
              continue
            fi
            
            CONCLUSION=$(echo "$RUNS_JSON" | jq -r '[.[] | select(.name != "Netbird updater")] | (map(select(.status == "completed" and .conclusion == "success")) | length) as $success_count | (map(select(.status == "completed" and (.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required"))) | length) as $failure_count | if $failure_count > 0 then "failure" elif $success_count == length then "success" else "pending" end')
            
            if [ "$CONCLUSION" = "success" ]; then
              echo "All checks passed!"
              break
            elif [ "$CONCLUSION" = "failure" ]; then
              echo "Checks failed. Aborting release."
              exit 1
            fi
            
            echo "Checks still running... (attempt $i/30)"
            sleep 20
          done

      - name: Create Release
        if: steps.compare.outputs.update == 'true' && steps.commit.outputs.made == 'true'
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          VERSION=$(TZ=UTC date +'%Y.%m.%d.%H%M')
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "Automated update of Netbird to version ${{ steps.compare.outputs.latest }}." \
            --target main
