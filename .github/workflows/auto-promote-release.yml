name: Auto-promote Release

on:
  release:
    types:
      - published

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == true
    permissions:
      contents: write
    steps:
      - name: Wait for release workflow
        run: sleep 30

      - name: Promote to regular release
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          gh release edit ${{ github.event.release.tag_name }} --repo ${{ github.repository }} --prerelease=false
